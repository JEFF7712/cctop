      <text x="70" y="148" fill="#9da7b3">5 calculations | </text>
      <text x="238" y="148" fill="#56d364">2 done</text>
      <text x="302" y="148" fill="#9da7b3"> | </text>
      <text x="326" y="148" fill="#ff7b72">1 failed</text>
      <text x="410" y="148" fill="#9da7b3"> | </text>
      <text x="434" y="148" fill="#d29922">1 suspicious</text>
      <text x="560" y="148" fill="#9da7b3"> | </text>
      <text x="584" y="148" fill="#79c0ff">1 running</text>
      <text x="680" y="148" fill="#9da7b3"> | 0 unknown</text>

      <text x="70" y="196" fill="#c9d1d9">Status      File                                              Energy Eh  Imag   Runtime</text>
      <text x="70" y="224" fill="#30363d">----------------------------------------------------------------------------------------</text>

      <text x="70" y="256" fill="#56d364" font-weight="700">DONE</text>
      <text x="188" y="256" fill="#f0f6fc">conformer_a/orca.out</text>
      <text x="632" y="256" fill="#f0f6fc">-383.913285</text>
      <text x="782" y="256" fill="#f0f6fc">0</text>
      <text x="824" y="256" fill="#f0f6fc">02:14:08</text>

      <text x="70" y="288" fill="#d29922" font-weight="700">SUSPICIOUS</text>
      <text x="188" y="288" fill="#f0f6fc">conformer_b/orca.out</text>
      <text x="632" y="288" fill="#f0f6fc">-383.910771</text>
      <text x="782" y="288" fill="#f0f6fc">1</text>
      <text x="824" y="288" fill="#f0f6fc">02:26:51</text>

      <text x="70" y="320" fill="#ff7b72" font-weight="700">FAILED</text>
      <text x="188" y="320" fill="#f0f6fc">metal_complex_scf/orca.out</text>
      <text x="704" y="320" fill="#8b949e">--</text>
      <text x="772" y="320" fill="#8b949e">--</text>
      <text x="824" y="320" fill="#f0f6fc">01:07:42</text>

      <text x="70" y="352" fill="#79c0ff" font-weight="700">RUNNING</text>
      <text x="188" y="352" fill="#f0f6fc">running_scan/orca.out</text>
      <text x="632" y="352" fill="#f0f6fc">-114.228446</text>
      <text x="772" y="352" fill="#8b949e">--</text>
      <text x="848" y="352" fill="#8b949e">--</text>

      <text x="70" y="384" fill="#56d364" font-weight="700">DONE</text>
      <text x="188" y="384" fill="#f0f6fc">single_point/orca.out</text>
      <text x="644" y="384" fill="#f0f6fc">-76.438120</text>
      <text x="772" y="384" fill="#8b949e">--</text>
