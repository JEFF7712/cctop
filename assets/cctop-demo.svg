<svg xmlns="http://www.w3.org/2000/svg" width="980" height="446" viewBox="0 0 980 446" role="img" aria-labelledby="title desc">
  <title id="title">cctop demo terminal output</title>
  <desc id="desc">A terminal-style screenshot of cctop summarizing five computational chemistry calculations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#151b23"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="980" height="446" rx="18" fill="#f6f8fa"/>
  <g filter="url(#shadow)">
    <rect x="42" y="34" width="896" height="378" rx="14" fill="url(#bg)"/>
    <rect x="42" y="34" width="896" height="44" rx="14" fill="#22272e"/>
    <path d="M42 64h896v16H42z" fill="#22272e"/>
    <circle cx="68" cy="56" r="6" fill="#ff5f57"/>
    <circle cx="88" cy="56" r="6" fill="#ffbd2e"/>
    <circle cx="108" cy="56" r="6" fill="#28c840"/>
    <text x="490" y="61" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8b949e">testing/demo_orca_project</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
